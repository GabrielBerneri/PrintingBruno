<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Pendiente | PrintingBruno</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/jpeg" href="assets/logo/logo.png">
</head>

<body>
    <header class="header scrolled" id="header">
        <div class="container">
            <a href="index.html" class="logo">
                <img class="logo-icon" src="assets/logo/logo.png" alt="PrintingBruno">Printing<span>Bruno</span>
            </a>
            <nav class="nav" id="nav">
                <ul class="nav-links">
                    <li><a href="index.html" class="nav-link">Inicio</a></li>
                    <li><a href="catalogo.html" class="nav-link">Catálogo</a></li>
                    <li><a href="nosotros.html" class="nav-link">Nosotros</a></li>
                    <li><a href="contacto.html" class="nav-link">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="admin-login">
        <div class="admin-login-card" style="max-width:500px;text-align:center">
            <div style="font-size:4rem;margin-bottom:var(--space-xl)">⏳</div>
            <h1
                style="font-family:var(--font-heading);font-size:2rem;font-weight:800;margin-bottom:var(--space-md);color:#fbbf24">
                Pago Pendiente</h1>

            <p style="color:var(--text-secondary);font-size:1.05rem;line-height:1.7;margin-bottom:var(--space-2xl)">Tu
                pago está siendo procesado. Te notificaremos por email cuando se confirme. Si pagaste con efectivo, el
                pago puede demorar 1-2 días hábiles.</p>
            <p id="paymentSyncStatus" style="color:var(--text-muted);font-size:0.95rem;margin:-0.5rem 0 var(--space-xl)"></p>
            <div style="display:flex;gap:var(--space-md);justify-content:center;flex-wrap:wrap">
                <a href="index.html" class="btn btn-primary btn-lg">Volver al Inicio</a>
                <a id="waContactBtn" href="https://wa.me/5491137022937?text=Hola!%20Tengo%20un%20pago%20pendiente" target="_blank"
                    class="btn btn-whatsapp btn-lg">Consultar Estado</a>
            </div>
        </div>
    </section>

    <script src="js/cart.js?v=20260331-1"></script>
    <script>Cart.clear();</script>
    <script>
        (async function syncPaymentReturn() {
            const params = new URLSearchParams(window.location.search);
            const order = params.get('order');

            if (!order) return;

            const statusEl = document.getElementById('paymentSyncStatus');
            statusEl.textContent = `Consultando estado actual en el servidor...`;

            try {
                const response = await fetch(`api/sync_payment.php?${params.toString()}`);
                const data = await response.json();
                if (data.success) {
                    if (data.order_number) {
                        document.getElementById('waContactBtn').href = `https://wa.me/5491137022937?text=Hola!%20Tengo%20un%20pago%20pendiente%20de%20la%20compra%20${encodeURIComponent(data.order_number)}`;
                    }
                    statusEl.textContent = data.payment_status === 'approved'
                        ? 'Ya registramos el pago.'
                        : 'Seguimos esperando la confirmacion del pago.';
                } else {
                    statusEl.textContent = `No se pudo consultar automaticamente el estado del pago.`;
                }
            } catch (error) {
                statusEl.textContent = `Error consultando el estado del pago.`;
            }
        })();
    </script>
</body>

</html>
