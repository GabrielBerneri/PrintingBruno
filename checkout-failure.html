<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago No Completado | PrintingBruno</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/jpeg" href="assets/logo/logo.png">
</head>

<body>
    <header class="header scrolled" id="header">
        <div class="container">
            <a href="index.html" class="logo">
                <img class="logo-icon" src="assets/logo/logo.png" alt="PrintingBruno">Printing<span>Bruno</span>
            </a>
            <nav class="nav" id="nav">
                <ul class="nav-links">
                    <li><a href="index.html" class="nav-link">Inicio</a></li>
                    <li><a href="catalogo.html" class="nav-link">Catálogo</a></li>
                    <li><a href="nosotros.html" class="nav-link">Nosotros</a></li>
                    <li><a href="contacto.html" class="nav-link">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="admin-login">
        <div class="admin-login-card" style="max-width:500px;text-align:center">
            <div style="font-size:4rem;margin-bottom:var(--space-xl)">❌</div>
            <h1
                style="font-family:var(--font-heading);font-size:2rem;font-weight:800;margin-bottom:var(--space-md);color:#e74c3c">
                Pago No Completado</h1>

            <p style="color:var(--text-secondary);font-size:1.05rem;line-height:1.7;margin-bottom:var(--space-2xl)">El
                pago no pudo ser procesado. Tus productos siguen en el carrito, podés intentar nuevamente o contactarnos
                para asistencia.</p>
            <p id="paymentSyncStatus" style="color:var(--text-muted);font-size:0.95rem;margin:-0.5rem 0 var(--space-xl)"></p>
            <div style="display:flex;gap:var(--space-md);justify-content:center;flex-wrap:wrap">
                <a href="catalogo.html" class="btn btn-primary btn-lg">Volver al Catálogo</a>
                <a id="waContactBtn" href="https://wa.me/5491137022937?text=Hola!%20Tuve%20un%20problema%20con%20mi%20pago"
                    target="_blank" class="btn btn-whatsapp btn-lg">Ayuda</a>
            </div>
        </div>
    </section>
    <script>
        (async function syncPaymentReturn() {
            const params = new URLSearchParams(window.location.search);
            const order = params.get('order');

            if (!order) return;

            const statusEl = document.getElementById('paymentSyncStatus');
            statusEl.textContent = `Registrando resultado del intento en servidor...`;

            try {
                const response = await fetch(`api/sync_payment.php?${params.toString()}`);
                const data = await response.json();
                if (data.success) {
                    if (data.order_number) {
                        document.getElementById('waContactBtn').href = `https://wa.me/5491137022937?text=Hola!%20Tuve%20un%20problema%20con%20el%20pago%20de%20la%20compra%20${encodeURIComponent(data.order_number)}`;
                    }
                    statusEl.textContent = 'Registramos el intento de pago. Si necesitás ayuda, escribinos.';
                } else {
                    statusEl.textContent = `No se pudo registrar automaticamente el intento de pago.`;
                }
            } catch (error) {
                statusEl.textContent = `Error registrando el resultado del pago.`;
            }
        })();
    </script>
</body>

</html>
