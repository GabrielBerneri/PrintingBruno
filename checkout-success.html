<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Compra Exitosa! | PrintingBruno</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/jpeg" href="assets/logo/logo.png">
</head>

<body>
    <header class="header scrolled" id="header">
        <div class="container">
            <a href="index.html" class="logo">
                <img class="logo-icon" src="assets/logo/logo.png" alt="PrintingBruno">Printing<span>Bruno</span>
            </a>
            <nav class="nav" id="nav">
                <ul class="nav-links">
                    <li><a href="index.html" class="nav-link">Inicio</a></li>
                    <li><a href="catalogo.html" class="nav-link">Catálogo</a></li>
                    <li><a href="nosotros.html" class="nav-link">Nosotros</a></li>
                    <li><a href="contacto.html" class="nav-link">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="admin-login">
        <div class="admin-login-card" style="max-width:500px;text-align:center">
            <div style="font-size:4rem;margin-bottom:var(--space-xl)">✅</div>
            <h1
                style="font-family:var(--font-heading);font-size:2rem;font-weight:800;margin-bottom:var(--space-md);color:#25D366">
                ¡Compra Exitosa!</h1>
            
            <div id="orderNumberContainer" style="display:none; margin: 0 0 var(--space-xl)">
                <div style="font-size:0.9rem;color:var(--text-muted);margin-bottom:4px">Tu N° de Orden</div>
                <div id="orderNumberDisplay" style="font-family:monospace;font-size:1.5rem;font-weight:800;color:var(--accent);background:rgba(255,107,43,0.1);padding:8px 20px;border-radius:8px;display:inline-block"></div>
            </div>

            <p style="color:var(--text-secondary);font-size:1.05rem;line-height:1.7;margin-bottom:var(--space-2xl)">Tu
                pago fue procesado correctamente. Pronto recibirás un email con los detalles de tu pedido y nos
                pondremos en contacto para coordinar el envío.</p>
            <p id="paymentSyncStatus" style="color:var(--text-muted);font-size:0.95rem;margin:-0.5rem 0 var(--space-xl)"></p>
            <div style="display:flex;gap:var(--space-md);justify-content:center;flex-wrap:wrap">
                <a href="catalogo.html" class="btn btn-primary btn-lg">Seguir Comprando</a>
                <a id="waContactBtn" href="https://wa.me/5491125544248?text=Hola!%20Acabo%20de%20realizar%20una%20compra" target="_blank"
                    class="btn btn-whatsapp btn-lg">Contactarnos</a>
            </div>
        </div>
    </section>

    <script src="js/cart.js?v=20260309-3"></script>
    <script>Cart.clear();</script>
    <script>
        (async function syncPaymentReturn() {
            const params = new URLSearchParams(window.location.search);
            const order = params.get('order');
            const on = params.get('on');
            
            if (on) {
                document.getElementById('orderNumberContainer').style.display = 'block';
                document.getElementById('orderNumberDisplay').textContent = on;
                document.getElementById('waContactBtn').href = `https://wa.me/5491125544248?text=Hola!%20Mi%20pedido%20es%20${on}`;
            }

            if (!order || !/^\d+$/.test(order)) return;

            const statusEl = document.getElementById('paymentSyncStatus');
            statusEl.textContent = `Validando estado del pago en servidor...`;

            try {
                const response = await fetch(`api/sync_payment.php?${params.toString()}`);
                const data = await response.json();
                if (data.success) {
                    statusEl.textContent = `Pedido #${data.order_id} actualizado como: ${data.status}.`;
                } else {
                    statusEl.textContent = `Pedido #${order}. No se pudo validar automáticamente.`;
                }
            } catch (error) {
                statusEl.textContent = `Pedido #${order}. Error validando el pago en local.`;
            }
        })();
    </script>
</body>

</html>
